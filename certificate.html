<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate - DBHub</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="main-content" style="margin-left:0;padding-top:32px;">
        <section class="glass-card" style="max-width:960px;margin:0 auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
                <h1 style="margin:0;"><i class="fas fa-certificate"></i> Completion Certificate</h1>
                <div class="btn-row">
                    <a class="btn btn-outline btn-sm" href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
                    <a class="btn btn-primary btn-sm" href="index.html"><i class="fas fa-book"></i> Learning Home</a>
                </div>
            </div>
            <p id="cert-message" class="text-sm text-tertiary" style="margin-top:10px;">Certificate details loaded from your latest score.</p>

            <div class="explanation-box" style="margin-top:16px;">
                <p>This certifies that <strong id="cert-student-name">-</strong> (<span id="cert-student-email">-</span>) has completed the DBHub learning journey.</p>
                <ul class="key-points">
                    <li>Final score: <strong id="cert-score">-</strong></li>
                    <li>Level: <strong id="cert-level">-</strong></li>
                    <li>Completion date: <strong id="cert-date">-</strong></li>
                    <li>Certificate ID: <strong id="cert-id">-</strong></li>
                </ul>
            </div>
        </section>
    </main>
    <script src="js/platform-api.js"></script>
    <script src="js/certificate.js"></script>
</body>
</html>
